<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mechanical Drawing Review Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f1efea;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --radius: 10px;
    --radius-lg: 14px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .page { max-width: 720px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
  .logo { width: 38px; height: 38px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .top-bar h1 { font-size: 18px; font-weight: 600; }
  .top-bar p { font-size: 13px; color: var(--text2); }

  /* Upload */
  .upload-zone { border: 2px dashed var(--border2); border-radius: var(--radius-lg); padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: background 0.15s, border-color 0.15s; background: var(--surface); margin-bottom: 1rem; }
  .upload-zone:hover, .upload-zone.dragover { background: var(--blue-light); border-color: var(--blue); }
  .upload-zone .up-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-zone .up-label { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .upload-zone .up-sub { font-size: 13px; color: var(--text3); }
  .file-row { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .file-row .fi { font-size: 22px; }
  .file-row .fn { font-weight: 500; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row .fs { font-size: 12px; color: var(--text3); }
  .file-row button { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 2px 4px; border-radius: 6px; }
  .file-row button:hover { background: var(--surface2); color: var(--text); }

  /* Checks */
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .checks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 6px; margin-bottom: 1.25rem; }
  .chip { display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid var(--border); cursor: pointer; font-size: 12.5px; color: var(--text2); background: var(--surface); transition: all 0.12s; user-select: none; }
  .chip:hover { border-color: var(--blue); color: var(--blue); }
  .chip.on { border-color: var(--blue); background: var(--blue-light); color: var(--blue); font-weight: 500; }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* Notes */
  .notes-wrap { margin-bottom: 1.25rem; }
  .notes-wrap label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
  .notes-wrap textarea { width: 100%; height: 68px; resize: none; font-size: 13px; padding: 9px 12px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; outline: none; transition: border-color 0.15s; }
  .notes-wrap textarea:focus { border-color: var(--blue); }

  /* Run button */
  .run-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 600; border-radius: var(--radius); border: none; background: var(--blue); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s; }
  .run-btn:hover:not(:disabled) { opacity: 0.88; }
  .run-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  /* Loading */
  .loading { text-align: center; padding: 3rem 0; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: var(--text2); }

  /* Report */
  .report-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .report-bar h2 { font-size: 18px; font-weight: 600; }
  .badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
  .badge-pass { background: var(--green-light); color: var(--green); }
  .badge-warn { background: var(--amber-light); color: var(--amber); }
  .badge-fail { background: var(--red-light); color: var(--red); }
  .summary-txt { font-size: 14px; color: var(--text2); margin-bottom: 1rem; line-height: 1.6; }
  .score-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1.25rem; }
  .score-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .score-card .num { font-size: 24px; font-weight: 700; }
  .score-card .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .num-ok { color: var(--green); }
  .num-warn { color: var(--amber); }
  .num-err { color: var(--red); }
  .acc { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 8px; overflow: hidden; }
  .acc-head { padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--surface2); }
  .acc-title { font-size: 14px; font-weight: 500; flex: 1; }
  .acc-status { font-size: 16px; }
  .acc-chev { font-size: 13px; color: var(--text3); transition: transform 0.2s; }
  .acc-body { display: none; padding: 0 14px 12px; border-top: 0.5px solid var(--border); }
  .acc-body.open { display: block; }
  .finding { display: flex; gap: 9px; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13.5px; line-height: 1.55; }
  .finding:last-child { border-bottom: none; }
  .fdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dok { background: #639922; } .dwarn { background: #BA7517; } .derr { background: #E24B4A; }
  .reset-btn { width: 100%; margin-top: 1rem; padding: 10px; font-size: 13px; color: var(--text2); background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; transition: background 0.15s; }
  .reset-btn:hover { background: var(--surface2); }

  /* Error banner */
  .err-banner { background: var(--red-light); border: 0.5px solid #F09595; border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--red); margin-bottom: 1rem; display: none; }
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div class="logo">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
    </div>
    <div>
      <h1>Drawing Review Agent</h1>
      <p>AI-powered mechanical drawing checklist reviewer</p>
    </div>
  </div>

  <div id="err-banner" class="err-banner"></div>

  <div id="main-panel">
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="up-icon">📐</div>
      <div class="up-label">Drop your drawing here or click to upload</div>
      <div class="up-sub">Supports PDF, PNG, JPG — 2D CAD, 3D screenshots, hand sketches</div>
    </div>
    <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg" style="display:none" />

    <div id="file-row" class="file-row" style="display:none">
      <span class="fi">📄</span>
      <span class="fn" id="fname"></span>
      <span class="fs" id="fsize"></span>
      <button onclick="removeFile()" title="Remove">✕</button>
    </div>

    <div class="section-label">Review checklist scope</div>
    <div class="checks-grid" id="checks-grid"></div>

    <div class="notes-wrap">
      <label for="ctx">Additional context (optional)</label>
      <textarea id="ctx" placeholder="e.g. Pressure vessel per ASME VIII, SS316L, tolerance class IT7, drawing standard ISO 2768..."></textarea>
    </div>

    <button class="run-btn" id="run-btn" onclick="runReview()" disabled>
      ▶ Run Review
    </button>
  </div>

  <div id="loading-panel" style="display:none" class="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Analyzing drawing...</p>
  </div>

  <div id="report-panel" style="display:none"></div>
</div>

<script>
const CHECKS = [
  { id:'title', label:'Title block' },
  { id:'dim', label:'Dimensions' },
  { id:'tol', label:'Tolerances' },
  { id:'gdt', label:'GD&T' },
  { id:'mat', label:'Material / coating' },
  { id:'thread', label:'Threads & bolting' },
  { id:'pressure', label:'Pressure parts' },
  { id:'mfg', label:'Manufacturing notes' },
  { id:'annot', label:'Annotations' },
  { id:'release', label:'Release checklist' },
  { id:'std', label:'Standards compliance' },
  { id:'manuf', label:'Manufacturability' },
];
let active = new Set(CHECKS.map(c => c.id));
let fileData = null, fileType = null;

// Build chips
const grid = document.getElementById('checks-grid');
CHECKS.forEach(c => {
  const el = document.createElement('div');
  el.className = 'chip on';
  el.innerHTML = `<span class="dot"></span>${c.label}`;
  el.onclick = () => {
    if (active.has(c.id)) { active.delete(c.id); el.classList.remove('on'); }
    else { active.add(c.id); el.classList.add('on'); }
  };
  grid.appendChild(el);
});

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(f) {
  if (!f) return;
  document.getElementById('fname').textContent = f.name;
  document.getElementById('fsize').textContent = (f.size/1048576).toFixed(1) + ' MB';
  document.getElementById('file-row').style.display = 'flex';
  document.getElementById('run-btn').disabled = false;
  const r = new FileReader();
  r.onload = ev => { fileData = ev.target.result.split(',')[1]; fileType = f.type || 'image/png'; };
  r.readAsDataURL(f);
}

function removeFile() {
  fileData = null; fileType = null;
  document.getElementById('file-row').style.display = 'none';
  document.getElementById('run-btn').disabled = true;
  document.getElementById('file-input').value = '';
}

const msgs = ['Parsing drawing geometry...','Checking title block fields...','Reviewing dimensions & tolerances...','Scanning GD&T symbols...','Checking material specs...','Assessing manufacturability...','Compiling report...'];

async function runReview() {
  if (!fileData) return;
  hideErr();
  document.getElementById('main-panel').style.display = 'none';
  document.getElementById('loading-panel').style.display = 'block';
  let mi = 0;
  const msgEl = document.getElementById('loading-msg');
  const iv = setInterval(() => { mi = (mi+1)%msgs.length; msgEl.textContent = msgs[mi]; }, 2200);

  const scope = CHECKS.filter(c => active.has(c.id)).map(c => c.label).join(', ');
  const ctx = document.getElementById('ctx').value.trim();
  const prompt = `You are a senior mechanical engineer reviewing an engineering drawing. Perform a structured review against: ${scope}.${ctx?' Context: '+ctx:''}

Return ONLY a JSON object (no markdown, no backticks) with this exact structure:
{"summary":"one sentence overall assessment","overallStatus":"PASS"|"WARN"|"FAIL","sections":[{"id":"string","title":"string","status":"PASS"|"WARN"|"FAIL","findings":[{"level":"OK"|"WARN"|"ERROR","text":"specific finding"}]}]}

Be specific and technical. Reference actual elements visible in the drawing. Mark as ERROR only serious issues blocking release.`;

  const contentBlock = fileType === 'application/pdf'
    ? { type:'document', source:{ type:'base64', media_type:'application/pdf', data:fileData } }
    : { type:'image', source:{ type:'base64', media_type:fileType, data:fileData } };

  try {
    const resp = await fetch('/api/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentBlock, prompt })
    });
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const result = await resp.json();
    clearInterval(iv);
    document.getElementById('loading-panel').style.display = 'none';
    renderReport(result);
  } catch(e) {
    clearInterval(iv);
    document.getElementById('loading-panel').style.display = 'none';
    document.getElementById('main-panel').style.display = 'block';
    showErr('Review failed: ' + e.message + '. Check your API key in Vercel environment variables.');
  }
}

function renderReport(r) {
  const panel = document.getElementById('report-panel');
  panel.style.display = 'block';
  const sm = { PASS:'pass', WARN:'warn', FAIL:'fail' };
  const sl = { PASS:'✅ Pass', WARN:'⚠️ Warnings', FAIL:'❌ Fail' };
  const findings = r.sections.flatMap(s => s.findings);
  const ok = findings.filter(f=>f.level==='OK').length;
  const wn = findings.filter(f=>f.level==='WARN').length;
  const er = findings.filter(f=>f.level==='ERROR').length;

  let html = `
    <div class="report-bar"><h2>Review Report</h2><span class="badge badge-${sm[r.overallStatus]}">${sl[r.overallStatus]}</span></div>
    <p class="summary-txt">${r.summary}</p>
    <div class="score-row">
      <div class="score-card"><div class="num num-ok">${ok}</div><div class="lbl">Passed</div></div>
      <div class="score-card"><div class="num num-warn">${wn}</div><div class="lbl">Warnings</div></div>
      <div class="score-card"><div class="num num-err">${er}</div><div class="lbl">Errors</div></div>
    </div>`;
  r.sections.forEach((sec,i) => {
    const si = sec.status==='PASS'?'✅':sec.status==='WARN'?'⚠️':'❌';
    html += `<div class="acc"><div class="acc-head" onclick="tog(${i})">
      <span class="acc-title">${sec.title}</span><span class="acc-status">${si}</span>
      <span class="acc-chev" id="chev${i}">▼</span></div>
      <div class="acc-body" id="body${i}">`;
    sec.findings.forEach(f => {
      const dc = f.level==='OK'?'dok':f.level==='WARN'?'dwarn':'derr';
      html += `<div class="finding"><div class="fdot ${dc}"></div><div>${f.text}</div></div>`;
    });
    html += `</div></div>`;
  });
  html += `<button class="reset-btn" onclick="reset()">↺ Review another drawing</button>`;
  panel.innerHTML = html;
}

function tog(i) {
  const b = document.getElementById('body'+i);
  const c = document.getElementById('chev'+i);
  const open = b.style.display === 'block';
  b.style.display = open ? 'none' : 'block';
  c.style.transform = open ? '' : 'rotate(180deg)';
}

function reset() {
  removeFile();
  document.getElementById('report-panel').style.display = 'none';
  document.getElementById('report-panel').innerHTML = '';
  document.getElementById('main-panel').style.display = 'block';
}

function showErr(msg) { const b=document.getElementById('err-banner'); b.textContent=msg; b.style.display='block'; }
function hideErr() { document.getElementById('err-banner').style.display='none'; }
</script>
</body>
</html>
